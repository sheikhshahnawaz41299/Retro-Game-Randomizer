<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Randomizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #121212; --surface-color: #1e1e1e; --primary-color: #90caf9;
            --text-main: #ffffff; --text-muted: #aaaaaa; --accent-green: #81c784;
            --accent-red: #e57373; --accent-yellow: #fff176;
        }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 400px; height: 100vh; display: flex; flex-direction: column; position: relative; }
        header { background-color: var(--surface-color); padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        
        .setup-area { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        #stats-text { color: var(--primary-color); font-size: 14px; display: block; margin-top: 10px; }
        
        /* Hidden File Input */
        #file-input { display: none; }
        .upload-btn { 
            background: var(--primary-color); color: #000; padding: 10px 20px; 
            border-radius: 5px; cursor: pointer; font-weight: bold; display: inline-block;
        }

        main { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 80px; }
        .card { background-color: var(--surface-color); border-radius: 8px; padding: 15px; margin-bottom: 10px; }
        .card-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 10px; }
        .icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; }

        nav { position: absolute; bottom: 0; width: 100%; background-color: var(--surface-color); display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-btn { background: none; border: none; color: var(--primary-color); display: flex; flex-direction: column; align-items: center; font-size: 12px; }
        .nav-btn.danger { color: var(--accent-red); }

        #toast { visibility: hidden; background-color: var(--accent-green); color: #000; padding: 12px; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); border-radius: 4px; font-weight: bold; z-index: 100; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

    <div id="app-container">
        <header>Retro Randomizer</header>
        
        <div class="setup-area">
            <label for="file-input" class="upload-btn">
                <span class="material-symbols-outlined" style="vertical-align: middle;">upload_file</span> 
                Load Game List (.txt)
            </label>
            <input type="file" id="file-input" accept=".txt,.json" onchange="handleFileUpload(event)">
            <span id="stats-text">No list loaded. Please upload one!</span>
        </div>

        <main id="games-container"></main>

        <nav>
            <button class="nav-btn" onclick="rollGames()">
                <span class="material-symbols-outlined">casino</span> Roll 10
            </button>
            <button class="nav-btn danger" onclick="confirmReset()">
                <span class="material-symbols-outlined">delete_forever</span> Reset All
            </button>
        </nav>

        <div id="toast">Done!</div>
    </div>

    <script>
        let allGames = [];
        let remainingGames = [];

        window.onload = () => {
            const savedMaster = localStorage.getItem('master_list');
            const savedRemaining = localStorage.getItem('remaining_pool');
            if (savedMaster) {
                allGames = JSON.parse(savedMaster);
                remainingGames = savedRemaining ? JSON.parse(savedRemaining) : [...allGames];
                updateStats();
            }
        };

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                let titles = [];

                if (file.name.endsWith('.json')) {
                    try {
                        const data = JSON.parse(content);
                        titles = [...new Set(Object.values(data))];
                    } catch (err) { showToast("Invalid JSON!", "#e57373"); return; }
                } else {
                    // Split by new lines and clean up
                    titles = content.split(/\r?\n/).map(t => t.trim()).filter(t => t !== "");
                }

                if (titles.length > 0) {
                    allGames = titles.sort();
                    remainingGames = [...allGames];
                    localStorage.setItem('master_list', JSON.stringify(allGames));
                    localStorage.setItem('remaining_pool', JSON.stringify(remainingGames));
                    updateStats();
                    showToast(`Loaded ${titles.length} games!`, "#81c784");
                }
            };
            reader.readAsText(file);
        }

        function updateStats() {
            const total = allGames.length;
            const remaining = remainingGames.length;
            const rolled = total - remaining;
            document.getElementById('stats-text').innerText = 
                total > 0 ? `Progress: ${rolled}/${total} (${((rolled/total)*100).toFixed(1)}%)` : "No list loaded.";
        }

        function rollGames() {
            if (remainingGames.length === 0) {
                showToast("List empty or fully rolled!", "#ffb74d");
                return;
            }
            let picked = [];
            let count = Math.min(10, remainingGames.length);
            for(let i=0; i<count; i++) {
                const idx = Math.floor(Math.random() * remainingGames.length);
                picked.push(remainingGames.splice(idx, 1)[0]);
            }
            localStorage.setItem('remaining_pool', JSON.stringify(remainingGames));
            updateStats();
            displayGames(picked);
        }

        function displayGames(games) {
            const container = document.getElementById('games-container');
            container.innerHTML = '';
            games.forEach((game, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="font-weight:bold">${i+1}. ${game}</div>
                    <div class="card-actions">
                        <button class="icon-btn" onclick="navigator.clipboard.writeText('${game.replace(/'/g, "\\'")}').then(() => showToast('Copied!'))">
                            <span class="material-symbols-outlined">content_copy</span>
                        </button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function confirmReset() {
            if(confirm("Delete all data and start over?")) {
                localStorage.clear();
                allGames = []; remainingGames = [];
                document.getElementById('games-container').innerHTML = '';
                updateStats();
                showToast("Cleared!", "#e57373");
            }
        }

        function showToast(msg, color="#81c784") {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.backgroundColor = color;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
