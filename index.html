<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Randomizer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #121212; --surface-color: #1e1e1e; --primary-color: #90caf9;
            --text-main: #ffffff; --text-muted: #aaaaaa; --accent-green: #81c784;
            --accent-red: #e57373; --accent-yellow: #fff176;
        }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 400px; height: 100vh; display: flex; flex-direction: column; position: relative; }
        header { background-color: var(--surface-color); padding: 15px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 2px solid #333; }
        
        .setup-area { padding: 15px; background: #1a1a1a; display: flex; flex-direction: column; gap: 10px; align-items: center; border-bottom: 1px solid #333; }
        select { background: #222; color: var(--primary-color); border: 1px solid var(--primary-color); padding: 8px; border-radius: 5px; width: 80%; font-size: 16px; text-align: center; }
        
        #file-input { display: none; }
        .upload-btn { color: var(--text-muted); font-size: 12px; text-decoration: underline; cursor: pointer; }

        main { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 80px; }
        .card { background-color: var(--surface-color); border-radius: 8px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--primary-color); }
        .card-actions { display: flex; justify-content: flex-end; gap: 20px; margin-top: 10px; }
        .icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; }
        .fav-active { color: var(--accent-yellow) !important; }

        nav { position: absolute; bottom: 0; width: 100%; background-color: var(--surface-color); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-btn { background: none; border: none; color: var(--primary-color); display: flex; flex-direction: column; align-items: center; font-size: 11px; gap: 4px; }
        .nav-btn.danger { color: var(--accent-red); }

        .modal-overlay { display: none; position: absolute; inset:0; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        .modal { background: var(--surface-color); padding: 20px; border-radius: 12px; width: 85%; max-height: 80%; display: flex; flex-direction: column; }
        
        #toast { visibility: hidden; background: var(--accent-green); color: #000; padding: 10px 20px; position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); border-radius: 20px; font-weight: bold; z-index: 200; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

    <div id="app-container">
        <header>Retro Randomizer</header>
        
        <div class="setup-area">
            <select id="console-select" onchange="switchConsole()">
                <option value="PSP">PSP</option>
                <option value="PS1">PS1</option>
                <option value="PS2">PS2</option>
                <option value="PS3">PS3</option>
            </select>
            <label for="file-input" class="upload-btn">Update List for this Console</label>
            <input type="file" id="file-input" accept=".txt" onchange="handleFileUpload(event)">
            <div id="stats-text" style="font-size: 13px; color: var(--primary-color);">Select a console</div>
        </div>

        <main id="games-container"></main>

        <nav>
            <button class="nav-btn" onclick="rollGames()">
                <span class="material-symbols-outlined">casino</span>ROLL
            </button>
            <button class="nav-btn" onclick="openFavorites()">
                <span class="material-symbols-outlined">star</span>FAVS
            </button>
            <button class="nav-btn danger" onclick="openReset()">
                <span class="material-symbols-outlined">restart_alt</span>RESET
            </button>
        </nav>

        <div id="toast">Done!</div>

        <div id="fav-modal" class="modal-overlay">
            <div class="modal">
                <h3>Favorites</h3>
                <div id="fav-list-content" style="flex:1; overflow:auto; margin-bottom:15px;"></div>
                <button onclick="closeModal('fav-modal')" style="padding:10px; background:var(--primary-color); border:none; border-radius:5px; font-weight:bold;">CLOSE</button>
            </div>
        </div>

        <div id="reset-modal" class="modal-overlay">
            <div class="modal" style="height:auto;">
                <h3 style="color:var(--accent-red)">Reset Console?</h3>
                <p>This will clear all progress and favorites for the selected console.</p>
                <div style="display:flex; justify-content:flex-end; gap:20px;">
                    <button onclick="closeModal('reset-modal')" style="background:none; border:none; color:white;">CANCEL</button>
                    <button onclick="confirmReset()" style="background:none; border:none; color:var(--accent-red); font-weight:bold;">RESET</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentConsole = "PSP";
        let db = { master: [], remaining: [], favs: [] };

        window.onload = () => { switchConsole(); };

        function switchConsole() {
            currentConsole = document.getElementById('console-select').value;
            const saved = localStorage.getItem(`data_${currentConsole}`);
            if (saved) {
                db = JSON.parse(saved);
            } else {
                db = { master: [], remaining: [], favs: [] };
            }
            document.getElementById('games-container').innerHTML = '';
            updateStats();
        }

        function saveToDisk() {
            localStorage.setItem(`data_${currentConsole}`, JSON.stringify(db));
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const titles = e.target.result.split(/\r?\n/).map(t => t.trim()).filter(t => t !== "");
                if (titles.length > 0) {
                    db.master = titles.sort();
                    db.remaining = [...db.master];
                    db.favs = [];
                    saveToDisk();
                    updateStats();
                    showToast(`Loaded ${titles.length} games for ${currentConsole}!`);
                }
            };
            reader.readAsText(file);
        }

        function updateStats() {
            const total = db.master.length;
            const rolled = total - db.remaining.length;
            const stats = document.getElementById('stats-text');
            if (total === 0) {
                stats.innerText = `No list for ${currentConsole}. Please upload one.`;
            } else {
                stats.innerText = `${currentConsole} Progress: ${rolled}/${total} (${((rolled/total)*100).toFixed(1)}%)`;
            }
        }

        function rollGames() {
            if (db.remaining.length === 0) { showToast("No games left!", "#ffb74d"); return; }
            let picked = [];
            let count = Math.min(10, db.remaining.length);
            for(let i=0; i<count; i++) {
                const idx = Math.floor(Math.random() * db.remaining.length);
                picked.push(db.remaining.splice(idx, 1)[0]);
            }
            saveToDisk();
            updateStats();
            displayGames(picked);
        }

        function displayGames(games) {
            const container = document.getElementById('games-container');
            container.innerHTML = '';
            games.forEach((game, i) => {
                const isFav = db.favs.includes(game);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="font-weight:bold">${game}</div>
                    <div class="card-actions">
                        <button class="icon-btn" onclick="copyText('${game.replace(/'/g, "\\'")}')"><span class="material-symbols-outlined">content_copy</span></button>
                        <button id="f-${i}" class="icon-btn ${isFav ? 'fav-active' : ''}" onclick="toggleFav('${game.replace(/'/g, "\\'")}', 'f-${i}')">
                            <span class="material-symbols-outlined">${isFav ? 'star' : 'star_border'}</span>
                        </button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function toggleFav(game, id) {
            const idx = db.favs.indexOf(game);
            if (idx > -1) { db.favs.splice(idx, 1); } else { db.favs.push(game); }
            saveToDisk();
            const btn = document.getElementById(id);
            if(btn) {
                btn.classList.toggle('fav-active');
                btn.querySelector('span').innerText = db.favs.includes(game) ? 'star' : 'star_border';
            }
            showToast(idx > -1 ? "Removed Fav" : "Added Fav");
        }

        function openFavorites() {
            const list = document.getElementById('fav-list-content');
            list.innerHTML = db.favs.length === 0 ? '<p>No favorites.</p>' : '';
            db.favs.forEach(game => {
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                    <span>${game}</span>
                    <span class="material-symbols-outlined" style="color:var(--accent-red)" onclick="toggleFav('${game.replace(/'/g, "\\'")}', null); openFavorites();">delete</span>
                </div>`;
            });
            document.getElementById('fav-modal').style.display = 'flex';
        }

        function openReset() { document.getElementById('reset-modal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function confirmReset() {
            db.remaining = [...db.master];
            db.favs = [];
            saveToDisk();
            updateStats();
            document.getElementById('games-container').innerHTML = '';
            closeModal('reset-modal');
            showToast("Console Progress Reset!");
        }

        function copyText(t) { navigator.clipboard.writeText(t).then(() => showToast("Copied!")); }
        function showToast(m, c="#81c784") {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.backgroundColor = c;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
