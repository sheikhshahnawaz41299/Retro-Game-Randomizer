<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Randomizer</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --surface2: #1f1f1f;
            --border: #2a2a2a;
            --border-hover: #3d3d3d;
            --text: #f0f0f0;
            --text-muted: #666;
            --text-dim: #444;
            --accent: #e8e8e8;
            --green: #4ade80;
            --yellow: #fbbf24;
            --red: #f87171;
            --blue: #60a5fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 420px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* HEADER */
        header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--bg);
            flex-shrink: 0;
        }

        .header-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
        }

        .app-title {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .progress-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        /* CONSOLE SELECTOR */
        .console-row {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 2px;
        }
        .console-row::-webkit-scrollbar { display: none; }

        .console-chip {
            flex-shrink: 0;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.05em;
        }
        .console-chip:hover { border-color: var(--border-hover); color: var(--text); }
        .console-chip.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
            font-weight: 500;
        }

        /* PROGRESS BAR */
        .progress-bar-wrap {
            height: 2px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--green);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        /* TOOLBAR */
        .toolbar {
            padding: 10px 20px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
        }

        .search-wrap {
            flex: 1;
            position: relative;
        }
        .search-wrap svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
        }
        #search-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 8px 10px 8px 32px;
            outline: none;
            transition: border-color 0.15s;
        }
        #search-input::placeholder { color: var(--text-dim); }
        #search-input:focus { border-color: var(--border-hover); }

        .upload-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            cursor: pointer;
            white-space: nowrap;
            letter-spacing: 0.04em;
            transition: all 0.15s;
        }
        .upload-btn:hover { border-color: var(--border-hover); color: var(--text); }
        #file-input { display: none; }

        /* MAIN */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 80px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 200px;
            color: var(--text-dim);
        }
        .empty-state svg { opacity: 0.3; }
        .empty-state p { font-size: 13px; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; }

        /* GAME CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
            transition: border-color 0.15s;
            animation: slideIn 0.2s ease both;
        }
        .card:hover { border-color: var(--border-hover); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-num {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            margin-bottom: 4px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .card-note {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 10px;
            line-height: 1.5;
            padding: 6px 10px;
            background: var(--surface2);
            border-radius: 6px;
            border-left: 2px solid var(--border-hover);
        }

        .note-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            padding: 6px 10px;
            outline: none;
            resize: none;
            margin-bottom: 10px;
            transition: border-color 0.15s;
        }
        .note-input:focus { border-color: var(--border-hover); }
        .note-input::placeholder { color: var(--text-dim); }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .act-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.15s;
        }
        .act-btn:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }
        .act-btn.fav-active { color: var(--yellow); }
        .act-btn.fav-active:hover { background: rgba(251,191,36,0.08); border-color: rgba(251,191,36,0.2); }
        .act-btn svg { width: 13px; height: 13px; }

        /* NAV */
        nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: stretch;
            height: 64px;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 10px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: color 0.15s;
            position: relative;
        }
        .nav-btn:hover { color: var(--text); }
        .nav-btn svg { width: 18px; height: 18px; }
        .nav-btn.roll { color: var(--text); }
        .nav-btn.roll svg { width: 22px; height: 22px; }
        .nav-btn.danger:hover { color: var(--red); }

        .nav-sep { width: 1px; background: var(--border); margin: 12px 0; }

        /* MODALS */
        .modal-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: flex-end;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-height: 80dvh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            animation: sheetUp 0.25s ease;
        }
        @keyframes sheetUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        .modal-handle {
            width: 36px;
            height: 3px;
            background: var(--border-hover);
            border-radius: 3px;
            margin: 0 auto 18px;
        }

        .modal-title {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .modal-scroll { flex: 1; overflow-y: auto; margin-bottom: 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        .fav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .fav-item:last-child { border-bottom: none; }
        .fav-item-name { font-size: 13px; color: var(--text); }
        .fav-item-console {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .fav-del {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.15s;
        }
        .fav-del:hover { color: var(--red); }

        .modal-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.15s;
        }
        .modal-btn:hover { border-color: var(--border-hover); background: var(--border); }
        .modal-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); margin-bottom: 8px; }
        .modal-btn.primary:hover { opacity: 0.85; }
        .modal-btn.danger { color: var(--red); border-color: rgba(248,113,113,0.2); }
        .modal-btn.danger:hover { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.4); }

        /* TOAST */
        #toast {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--surface2);
            border: 1px solid var(--border-hover);
            color: var(--text);
            padding: 8px 18px;
            border-radius: 20px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.06em;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .no-favs {
            text-align: center;
            padding: 30px 0;
            color: var(--text-dim);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
<div id="app">

    <header>
        <div class="header-top">
            <span class="app-title">Retro Randomizer</span>
            <span class="progress-label" id="progress-label">—</span>
        </div>
        <div class="console-row" id="console-row"></div>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
    </header>

    <div class="toolbar">
        <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="search-input" placeholder="Filter rolled games…" oninput="filterGames()">
        </div>
        <label for="file-input" class="upload-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            LIST
        </label>
        <input type="file" id="file-input" accept=".txt" onchange="handleFileUpload(event)">
    </div>

    <main id="games-container">
        <div class="empty-state">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01M8 12h.01M16 12h.01"/></svg>
            <p>roll to begin</p>
        </div>
    </main>

    <nav>
        <button class="nav-btn roll" onclick="rollGames()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="4"/><circle cx="8" cy="8" r="1.2" fill="currentColor"/><circle cx="16" cy="8" r="1.2" fill="currentColor"/><circle cx="8" cy="16" r="1.2" fill="currentColor"/><circle cx="16" cy="16" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/></svg>
            ROLL
        </button>
        <div class="nav-sep"></div>
        <button class="nav-btn" onclick="openFavorites()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            FAVS
        </button>
        <div class="nav-sep"></div>
        <button class="nav-btn danger" onclick="openReset()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            RESET
        </button>
    </nav>

    <div id="toast"></div>

    <!-- FAVORITES MODAL -->
    <div id="fav-modal" class="modal-overlay" onclick="handleOverlayClick(event,'fav-modal')">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-title">Favorites</div>
            <div class="modal-scroll" id="fav-list-content"></div>
            <button class="modal-btn primary" onclick="exportFavorites()">Export as .txt</button>
            <button class="modal-btn" onclick="closeModal('fav-modal')">Close</button>
        </div>
    </div>

    <!-- RESET MODAL -->
    <div id="reset-modal" class="modal-overlay" onclick="handleOverlayClick(event,'reset-modal')">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-title">Reset Console</div>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6;">
                This clears all rolled progress and favorites for <strong id="reset-console-name" style="color:var(--text)"></strong>.
            </p>
            <button class="modal-btn danger" onclick="confirmReset()">Reset Progress</button>
            <div style="height:8px"></div>
            <button class="modal-btn" onclick="closeModal('reset-modal')">Cancel</button>
        </div>
    </div>

</div>

<script>
    const CONSOLES = [
        { id: 'PSP',  label: 'PSP'  },
        { id: 'PS1',  label: 'PS1'  },
        { id: 'PS2',  label: 'PS2'  },
        { id: 'PS3',  label: 'PS3'  },
        { id: 'PS4',  label: 'PS4'  },
        { id: 'GBA',  label: 'GBA'  },
        { id: 'GBC',  label: 'GBC'  },
        { id: 'GB',   label: 'GB'   },
        { id: 'NDS',  label: 'NDS'  },
        { id: '3DS',  label: '3DS'  },
        { id: 'SNES', label: 'SNES' },
        { id: 'NES',  label: 'NES'  },
        { id: 'N64',  label: 'N64'  },
        { id: 'NGC',  label: 'GCN'  },
        { id: 'WII',  label: 'Wii'  },
        { id: 'WIIU', label: 'WiiU' },
        { id: 'NSW',  label: 'Switch'},
        { id: 'GEN',  label: 'Genesis'},
        { id: 'SAT',  label: 'Saturn'},
        { id: 'DC',   label: 'Dreamcast'},
        { id: 'XBOX', label: 'Xbox' },
        { id: 'X360', label: 'X360' },
        { id: 'PC',   label: 'PC'   },
    ];

    let currentConsole = 'PSP';
    let db = { master: [], remaining: [], favs: [], notes: {} };
    let rolledGames = [];

    // Build console chips
    const consoleRow = document.getElementById('console-row');
    CONSOLES.forEach(c => {
        const chip = document.createElement('button');
        chip.className = 'console-chip' + (c.id === currentConsole ? ' active' : '');
        chip.textContent = c.label;
        chip.dataset.id = c.id;
        chip.onclick = () => switchConsole(c.id);
        consoleRow.appendChild(chip);
    });

    window.onload = () => switchConsole(currentConsole);

    function switchConsole(id) {
        currentConsole = id;
        document.querySelectorAll('.console-chip').forEach(c => {
            c.classList.toggle('active', c.dataset.id === id);
        });
        // Scroll chip into view
        const activeChip = consoleRow.querySelector('.active');
        if (activeChip) activeChip.scrollIntoView({ inline: 'center', behavior: 'smooth' });

        const saved = localStorage.getItem(`rrp_${currentConsole}`);
        db = saved ? JSON.parse(saved) : { master: [], remaining: [], favs: [], notes: {} };
        if (!db.notes) db.notes = {};
        rolledGames = [];
        document.getElementById('games-container').innerHTML = `
            <div class="empty-state">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01M8 12h.01M16 12h.01"/></svg>
                <p>roll to begin</p>
            </div>`;
        document.getElementById('search-input').value = '';
        updateStats();
    }

    function save() {
        localStorage.setItem(`rrp_${currentConsole}`, JSON.stringify(db));
    }

    function updateStats() {
        const total = db.master.length;
        const rolled = total - db.remaining.length;
        const pct = total > 0 ? (rolled / total * 100) : 0;
        document.getElementById('progress-label').textContent =
            total === 0 ? 'no list' : `${rolled}/${total}`;
        document.getElementById('progress-fill').style.width = pct + '%';
    }

    function handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const titles = ev.target.result.split(/\r?\n/).map(t => t.trim()).filter(Boolean);
            if (titles.length > 0) {
                db.master = titles.sort();
                db.remaining = [...db.master];
                db.favs = [];
                db.notes = {};
                save();
                updateStats();
                rolledGames = [];
                document.getElementById('games-container').innerHTML = `
                    <div class="empty-state">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01M8 12h.01M16 12h.01"/></svg>
                        <p>roll to begin</p>
                    </div>`;
                showToast(`Loaded ${titles.length} games`);
            }
        };
        reader.readAsText(file);
        e.target.value = '';
    }

    function rollGames() {
        if (db.remaining.length === 0) { showToast('No games left!'); return; }
        const count = Math.min(10, db.remaining.length);
        const picked = [];
        for (let i = 0; i < count; i++) {
            const idx = Math.floor(Math.random() * db.remaining.length);
            picked.push(db.remaining.splice(idx, 1)[0]);
        }
        rolledGames = picked;
        save();
        updateStats();
        renderGames(rolledGames);
    }

    function filterGames() {
        renderGames(rolledGames);
    }

    function renderGames(games) {
        const q = document.getElementById('search-input').value.toLowerCase().trim();
        const filtered = q ? games.filter(g => g.toLowerCase().includes(q)) : games;
        const container = document.getElementById('games-container');

        if (games.length === 0) {
            container.innerHTML = `<div class="empty-state">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01M8 12h.01M16 12h.01"/></svg>
                <p>roll to begin</p>
            </div>`;
            return;
        }

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><p>no matches</p></div>`;
            return;
        }

        container.innerHTML = '';
        filtered.forEach((game, i) => {
            const isFav = db.favs.includes(game);
            const note = db.notes[game] || '';
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${i * 30}ms`;
            const safeGame = game.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');

            card.innerHTML = `
                <div class="card-num">${String(i + 1).padStart(2, '0')}</div>
                <div class="card-title">${game}</div>
                ${note ? `<div class="card-note">${escapeHtml(note)}</div>` : ''}
                <textarea class="note-input ${note ? 'editing' : ''}"
                    placeholder="Add a note…"
                    rows="1"
                    style="${note ? '' : 'display:none'}"
                    onchange="saveNote('${safeGame}', this.value)"
                    oninput="autoResize(this)"
                >${escapeHtml(note)}</textarea>
                <div class="card-actions">
                    <button class="act-btn ${isFav ? 'fav-active' : ''}" onclick="toggleFav('${safeGame}', this)">
                        <svg viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        ${isFav ? 'SAVED' : 'SAVE'}
                    </button>
                    <button class="act-btn" onclick="toggleNote(this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        NOTE
                    </button>
                    <button class="act-btn" onclick="copyText('${safeGame}')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        COPY
                    </button>
                </div>`;
            container.appendChild(card);
        });
    }

    function toggleNote(btn) {
        const card = btn.closest('.card');
        const noteDisplay = card.querySelector('.card-note');
        const textarea = card.querySelector('.note-input');
        if (noteDisplay) { noteDisplay.style.display = 'none'; }
        if (textarea.style.display === 'none') {
            textarea.style.display = 'block';
            autoResize(textarea);
            textarea.focus();
        } else {
            textarea.style.display = 'none';
            if (noteDisplay && noteDisplay.textContent.trim()) noteDisplay.style.display = 'block';
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function saveNote(game, value) {
        const decoded = game.replace(/\\'/g, "'");
        if (value.trim()) {
            db.notes[decoded] = value.trim();
        } else {
            delete db.notes[decoded];
        }
        save();
        // Update display note
        renderGames(rolledGames);
        showToast('Note saved');
    }

    function toggleFav(game, btn) {
        const decoded = game.replace(/\\'/g, "'");
        const idx = db.favs.indexOf(decoded);
        if (idx > -1) {
            db.favs.splice(idx, 1);
            btn.classList.remove('fav-active');
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> SAVE`;
            showToast('Removed from favs');
        } else {
            db.favs.push(decoded);
            btn.classList.add('fav-active');
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> SAVED`;
            showToast('Added to favs');
        }
        save();
    }

    function openFavorites() {
        const list = document.getElementById('fav-list-content');
        if (db.favs.length === 0) {
            list.innerHTML = '<div class="no-favs">no favorites yet</div>';
        } else {
            list.innerHTML = db.favs.map(g => `
                <div class="fav-item">
                    <div>
                        <div class="fav-item-name">${escapeHtml(g)}</div>
                        <div class="fav-item-console">${currentConsole}</div>
                    </div>
                    <button class="fav-del" onclick="removeFavFromModal('${g.replace(/'/g, "\\'")}')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                    </button>
                </div>`).join('');
        }
        document.getElementById('fav-modal').classList.add('open');
    }

    function removeFavFromModal(game) {
        const decoded = game.replace(/\\'/g, "'");
        db.favs = db.favs.filter(f => f !== decoded);
        save();
        openFavorites();
        renderGames(rolledGames);
        showToast('Removed');
    }

    function exportFavorites() {
        if (db.favs.length === 0) { showToast('No favorites to export'); return; }
        const lines = [`# ${currentConsole} Favorites — Retro Randomizer`, `# Exported ${new Date().toLocaleDateString()}`, '', ...db.favs];
        const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${currentConsole}_favorites.txt`;
        a.click();
        showToast('Exported!');
    }

    function openReset() {
        document.getElementById('reset-console-name').textContent = currentConsole;
        document.getElementById('reset-modal').classList.add('open');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('open');
    }

    function handleOverlayClick(e, id) {
        if (e.target === e.currentTarget) closeModal(id);
    }

    function confirmReset() {
        db.remaining = [...db.master];
        db.favs = [];
        db.notes = {};
        save();
        updateStats();
        rolledGames = [];
        document.getElementById('games-container').innerHTML = `
            <div class="empty-state">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01M8 12h.01M16 12h.01"/></svg>
                <p>roll to begin</p>
            </div>`;
        document.getElementById('search-input').value = '';
        closeModal('reset-modal');
        showToast('Progress reset');
    }

    function copyText(t) {
        const decoded = t.replace(/\\'/g, "'");
        navigator.clipboard.writeText(decoded).then(() => showToast('Copied!'));
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
