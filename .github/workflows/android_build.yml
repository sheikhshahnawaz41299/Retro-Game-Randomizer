name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp index.html www/
          echo '{"name": "retro-randomizer", "version": "1.0.0", "dependencies": {"@capacitor/core": "latest", "@capacitor/cli": "latest", "@capacitor/android": "latest"}}' > package.json

      - name: Install Capacitor
        run: npm install

      - name: Initialize Capacitor
        run: npx cap init "Retro Randomizer" "com.retrorandomizer.app" --web-dir www

      - name: Add Android Platform
        run: npx cap add android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../RetroRandomizer.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: RetroRandomizer.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
